<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- bg circle -->
  <circle cx="60" cy="60" r="58" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>

  <!-- sparkles -->
  <circle cx="22" cy="28" r="2" fill="#60A5FA" opacity="0.7"/>
  <circle cx="98" cy="28" r="2" fill="#60A5FA" opacity="0.7"/>
  <circle cx="16" cy="75" r="1.5" fill="#3B82F6" opacity="0.5"/>
  <circle cx="104" cy="75" r="1.5" fill="#3B82F6" opacity="0.5"/>

  <!-- sponge body -->
  <rect x="36" y="42" width="48" height="40" rx="8" fill="#FDE68A" stroke="#F59E0B" stroke-width="2"/>

  <!-- holes -->
  <circle cx="48" cy="56" r="3" fill="#FBBF24"/>
  <circle cx="64" cy="62" r="3.5" fill="#FBBF24"/>
  <circle cx="52" cy="72" r="2.5" fill="#FBBF24"/>
  <circle cx="70" cy="52" r="2" fill="#FBBF24"/>

  <!-- face -->
  <!-- big curious eyes (slightly larger) -->
  <circle cx="50" cy="58" r="4.5" fill="white"/>
  <circle cx="68" cy="58" r="4.5" fill="white"/>
  <circle cx="52" cy="57" r="2.5" fill="#1E293B"/>
  <circle cx="70" cy="57" r="2.5" fill="#1E293B"/>
  <circle cx="52.8" cy="56.2" r="1" fill="white"/>
  <circle cx="70.8" cy="56.2" r="1" fill="white"/>

  <!-- curious 'o' mouth -->
  <circle cx="59" cy="66" r="2.5" fill="#1E293B"/>
  <circle cx="59" cy="66" r="1.5" fill="#EF4444" opacity="0.6"/>

  <!-- blush -->
  <circle cx="43" cy="64" r="3.5" fill="#FECACA" opacity="0.5"/>
  <circle cx="75" cy="64" r="3.5" fill="#FECACA" opacity="0.5"/>

  <!-- magnifying glass (right hand) -->
  <g transform="translate(86,46)">
    <circle cx="8" cy="0" r="8" fill="none" stroke="#6366F1" stroke-width="2.5"/>
    <circle cx="8" cy="0" r="5" fill="#DBEAFE" opacity="0.5"/>
    <line x1="2" y1="6" x2="-4" y2="14" stroke="#6366F1" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- right arm holding magnifying glass -->
  <path d="M84 55c4-2 5-5 6-7" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- left arm pointing -->
  <path d="M36 55c-5-1-9-5-12-8" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <circle cx="23" cy="46" r="3" fill="#FDE68A" stroke="#F59E0B" stroke-width="1.5"/>

  <!-- legs -->
  <rect x="46" y="82" width="8" height="10" rx="4" fill="#FDE68A" stroke="#F59E0B" stroke-width="1.5"/>
  <rect x="64" y="82" width="8" height="10" rx="4" fill="#FDE68A" stroke="#F59E0B" stroke-width="1.5"/>

  <!-- explorer hat -->
  <ellipse cx="60" cy="42" rx="22" ry="4" fill="#A78BFA" opacity="0.8"/>
  <path d="M42 42c2-10 14-16 18-16s16 6 18 16" fill="#8B5CF6" stroke="#7C3AED" stroke-width="1.5"/>

  <!-- question marks floating -->
  <text x="20" y="30" font-family="sans-serif" font-weight="700" font-size="8" fill="#93C5FD" opacity="0.8">?</text>
  <text x="96" y="35" font-family="sans-serif" font-weight="700" font-size="6" fill="#93C5FD" opacity="0.6">?</text>
</svg>

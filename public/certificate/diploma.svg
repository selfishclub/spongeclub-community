<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" fill="none">
  <!-- 배경 -->
  <rect width="600" height="420" rx="0" fill="#FFFBEB"/>

  <!-- 테두리 장식 -->
  <rect x="12" y="12" width="576" height="396" rx="0" fill="none" stroke="#F59E0B" stroke-width="2"/>
  <rect x="20" y="20" width="560" height="380" rx="0" fill="none" stroke="#FCD34D" stroke-width="1" stroke-dasharray="6 4"/>

  <!-- 모서리 장식 -->
  <circle cx="20" cy="20" r="4" fill="#F59E0B"/>
  <circle cx="580" cy="20" r="4" fill="#F59E0B"/>
  <circle cx="20" cy="400" r="4" fill="#F59E0B"/>
  <circle cx="580" cy="400" r="4" fill="#F59E0B"/>

  <!-- 스폰지 아이콘 -->
  <g transform="translate(300,70)">
    <rect x="-16" y="-14" width="32" height="26" rx="6" fill="#FDE68A" stroke="#F59E0B" stroke-width="1.5"/>
    <circle cx="-6" cy="-4" r="2" fill="#FBBF24"/>
    <circle cx="5" cy="0" r="2.5" fill="#FBBF24"/>
    <circle cx="-3" cy="6" r="1.5" fill="#FBBF24"/>
    <circle cx="8" cy="-6" r="1.5" fill="#FBBF24"/>
    <!-- face -->
    <circle cx="-5" cy="-2" r="2" fill="white"/>
    <circle cx="5" cy="-2" r="2" fill="white"/>
    <circle cx="-4.2" cy="-2.5" r="1.2" fill="#1E293B"/>
    <circle cx="5.8" cy="-2.5" r="1.2" fill="#1E293B"/>
    <path d="M-3 4c1.5 2.5 4.5 2.5 6 0" stroke="#1E293B" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  </g>

  <!-- 제목 -->
  <text x="300" y="125" text-anchor="middle" font-family="serif" font-size="14" fill="#B45309" letter-spacing="8">CERTIFICATE OF COMPLETION</text>

  <text x="300" y="165" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="32" fill="#1E293B">수 료 증</text>

  <!-- 이름 영역 (동적으로 채워질 부분) -->
  <line x1="160" y1="230" x2="440" y2="230" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="300" y="222" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="28" fill="#1E293B" id="member-name">이름</text>
  <text x="300" y="250" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#92400E">위 사람은 스폰지클럽 1기 과정을 수료하였음을 증명합니다.</text>

  <!-- 기간 -->
  <text x="300" y="290" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#78716C">2026년 5월 3일 — 2026년 6월 14일</text>

  <!-- 출석 -->
  <text x="300" y="315" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="13" fill="#B45309" id="attendance-text">출석 N / 7회</text>

  <!-- 하단 장식선 -->
  <line x1="200" y1="345" x2="400" y2="345" stroke="#FCD34D" stroke-width="1"/>

  <!-- 발급 정보 -->
  <text x="300" y="370" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#A8A29E">스폰지클럽 · 이기적 공유 커뮤니티</text>
  <text x="300" y="388" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#D6D3D1">2026년 6월 14일 발급</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- bg circle -->
  <circle cx="60" cy="60" r="58" fill="#FFF7ED" stroke="#FDBA74" stroke-width="2"/>

  <!-- sparkles -->
  <circle cx="22" cy="28" r="2" fill="#FCD34D" opacity="0.7"/>
  <circle cx="98" cy="28" r="2" fill="#FCD34D" opacity="0.7"/>
  <circle cx="16" cy="75" r="1.5" fill="#FB923C" opacity="0.5"/>
  <circle cx="104" cy="75" r="1.5" fill="#FB923C" opacity="0.5"/>

  <!-- sponge body -->
  <rect x="36" y="38" width="48" height="40" rx="8" fill="#FDE68A" stroke="#F59E0B" stroke-width="2"/>

  <!-- holes -->
  <circle cx="48" cy="52" r="3" fill="#FBBF24"/>
  <circle cx="64" cy="58" r="3.5" fill="#FBBF24"/>
  <circle cx="52" cy="68" r="2.5" fill="#FBBF24"/>
  <circle cx="70" cy="48" r="2" fill="#FBBF24"/>

  <!-- face -->
  <circle cx="50" cy="55" r="3.5" fill="white"/>
  <circle cx="68" cy="55" r="3.5" fill="white"/>
  <circle cx="51.5" cy="54" r="2" fill="#1E293B"/>
  <circle cx="69.5" cy="54" r="2" fill="#1E293B"/>
  <circle cx="52.3" cy="53.2" r="0.8" fill="white"/>
  <circle cx="70.3" cy="53.2" r="0.8" fill="white"/>

  <!-- big excited smile -->
  <path d="M50 63c3 5 10 5 13 0" stroke="#1E293B" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- blush -->
  <circle cx="44" cy="62" r="3.5" fill="#FECACA" opacity="0.5"/>
  <circle cx="74" cy="62" r="3.5" fill="#FECACA" opacity="0.5"/>

  <!-- megaphone (right hand) -->
  <g transform="translate(88,48) rotate(15)">
    <path d="M0 0L14 -6L14 6Z" fill="#FB923C" stroke="#EA580C" stroke-width="1.2"/>
    <rect x="-4" y="-2" width="5" height="4" rx="1" fill="#FDBA74" stroke="#EA580C" stroke-width="1"/>
  </g>

  <!-- left arm waving -->
  <path d="M36 52c-5-2-10-8-12-14" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <circle cx="24" cy="36" r="3" fill="#FDE68A" stroke="#F59E0B" stroke-width="1.5"/>

  <!-- right arm holding megaphone -->
  <path d="M84 52c4-1 6-2 7-3" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- legs -->
  <rect x="46" y="78" width="8" height="10" rx="4" fill="#FDE68A" stroke="#F59E0B" stroke-width="1.5"/>
  <rect x="64" y="78" width="8" height="10" rx="4" fill="#FDE68A" stroke="#F59E0B" stroke-width="1.5"/>

  <!-- headband -->
  <path d="M36 42c8-4 28-4 48 0" stroke="#EF4444" stroke-width="3" stroke-linecap="round" fill="none"/>
  <text x="60" y="41" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="6" fill="white">파이팅</text>

  <!-- action lines -->
  <path d="M20 44l-6-3" stroke="#FBBF24" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M18 50l-7 0" stroke="#FBBF24" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M20 56l-6 3" stroke="#FBBF24" stroke-width="1.5" stroke-linecap="round"/>
</svg>

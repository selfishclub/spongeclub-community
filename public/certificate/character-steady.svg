<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- bg circle -->
  <circle cx="60" cy="60" r="58" fill="#F0F9FF" stroke="#7DD3FC" stroke-width="2"/>

  <!-- sparkles -->
  <circle cx="22" cy="28" r="2" fill="#38BDF8" opacity="0.7"/>
  <circle cx="98" cy="28" r="2" fill="#38BDF8" opacity="0.7"/>
  <circle cx="16" cy="75" r="1.5" fill="#0EA5E9" opacity="0.5"/>
  <circle cx="104" cy="75" r="1.5" fill="#0EA5E9" opacity="0.5"/>

  <!-- sponge body -->
  <rect x="36" y="42" width="48" height="40" rx="8" fill="#FDE68A" stroke="#F59E0B" stroke-width="2"/>

  <!-- holes -->
  <circle cx="48" cy="56" r="3" fill="#FBBF24"/>
  <circle cx="64" cy="62" r="3.5" fill="#FBBF24"/>
  <circle cx="52" cy="72" r="2.5" fill="#FBBF24"/>
  <circle cx="70" cy="52" r="2" fill="#FBBF24"/>

  <!-- face - calm relaxed eyes -->
  <circle cx="50" cy="58" r="3.5" fill="white"/>
  <circle cx="68" cy="58" r="3.5" fill="white"/>
  <circle cx="51" cy="57.5" r="2" fill="#1E293B"/>
  <circle cx="69" cy="57.5" r="2" fill="#1E293B"/>
  <circle cx="51.8" cy="56.7" r="0.8" fill="white"/>
  <circle cx="69.8" cy="56.7" r="0.8" fill="white"/>

  <!-- calm content smile -->
  <path d="M52 64c2 2.5 8 2.5 10 0" stroke="#1E293B" stroke-width="1.8" stroke-linecap="round" fill="none"/>

  <!-- blush -->
  <circle cx="43" cy="63" r="3.5" fill="#FECACA" opacity="0.5"/>
  <circle cx="75" cy="63" r="3.5" fill="#FECACA" opacity="0.5"/>

  <!-- clock (right side) -->
  <g transform="translate(90,45)">
    <circle cx="0" cy="0" r="10" fill="white" stroke="#0EA5E9" stroke-width="1.8"/>
    <circle cx="0" cy="0" r="8" fill="#F0F9FF"/>
    <!-- clock hands -->
    <line x1="0" y1="0" x2="0" y2="-5" stroke="#1E293B" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="4" y2="2" stroke="#1E293B" stroke-width="1.2" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="1" fill="#1E293B"/>
    <!-- hour marks -->
    <circle cx="0" cy="-7" r="0.8" fill="#0EA5E9"/>
    <circle cx="7" cy="0" r="0.8" fill="#0EA5E9"/>
    <circle cx="0" cy="7" r="0.8" fill="#0EA5E9"/>
    <circle cx="-7" cy="0" r="0.8" fill="#0EA5E9"/>
  </g>

  <!-- right arm holding clock -->
  <path d="M84 56c3-2 4-5 5-8" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- left arm relaxed -->
  <path d="M36 56c-5 2-8 5-9 8" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <circle cx="26" cy="65" r="3" fill="#FDE68A" stroke="#F59E0B" stroke-width="1.5"/>

  <!-- legs -->
  <rect x="46" y="82" width="8" height="10" rx="4" fill="#FDE68A" stroke="#F59E0B" stroke-width="1.5"/>
  <rect x="64" y="82" width="8" height="10" rx="4" fill="#FDE68A" stroke="#F59E0B" stroke-width="1.5"/>

  <!-- turtle shell pattern on back (visible slightly) -->
  <ellipse cx="60" cy="62" rx="20" ry="16" fill="none" stroke="#0EA5E9" stroke-width="1" stroke-dasharray="3 2" opacity="0.3"/>

  <!-- headband with 꾸준 -->
  <path d="M36 46c8-4 28-4 48 0" stroke="#0EA5E9" stroke-width="3" stroke-linecap="round" fill="none"/>
  <text x="60" y="45" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="6" fill="white">꾸준</text>

  <!-- check marks floating -->
  <path d="M18 34l2 2 4-4" stroke="#38BDF8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.7"/>
  <path d="M96 70l1.5 1.5 3-3" stroke="#38BDF8" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>
</svg>

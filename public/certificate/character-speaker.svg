<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- bg circle -->
  <circle cx="60" cy="60" r="58" fill="#FFF7ED" stroke="#FDBA74" stroke-width="2"/>

  <!-- sparkles -->
  <circle cx="16" cy="50" r="2" fill="#FB923C" opacity="0.7"/>
  <circle cx="14" cy="75" r="1.5" fill="#F97316" opacity="0.5"/>

  <!-- sponge body -->
  <rect x="36" y="44" width="48" height="40" rx="8" fill="#FDE68A" stroke="#F59E0B" stroke-width="2"/>

  <!-- holes -->
  <circle cx="48" cy="58" r="3" fill="#FBBF24"/>
  <circle cx="64" cy="64" r="3.5" fill="#FBBF24"/>
  <circle cx="52" cy="74" r="2.5" fill="#FBBF24"/>
  <circle cx="70" cy="54" r="2" fill="#FBBF24"/>

  <!-- face - excited wide eyes -->
  <circle cx="50" cy="60" r="4" fill="white"/>
  <circle cx="68" cy="60" r="4" fill="white"/>
  <circle cx="51.5" cy="59" r="2.2" fill="#1E293B"/>
  <circle cx="69.5" cy="59" r="2.2" fill="#1E293B"/>
  <circle cx="52.3" cy="58.2" r="0.9" fill="white"/>
  <circle cx="70.3" cy="58.2" r="0.9" fill="white"/>

  <!-- excited open mouth smile -->
  <path d="M50 66c3 5 10 5 13 0" stroke="#1E293B" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M52 66c2 3 7 3 9 0" fill="#EF4444" opacity="0.4"/>

  <!-- blush -->
  <circle cx="43" cy="66" r="3.5" fill="#FECACA" opacity="0.5"/>
  <circle cx="75" cy="66" r="3.5" fill="#FECACA" opacity="0.5"/>

  <!-- speech bubble (top right) -->
  <g transform="translate(74,16)">
    <rect x="0" y="0" width="32" height="22" rx="8" fill="white" stroke="#94A3B8" stroke-width="1.5"/>
    <!-- speech bubble tail -->
    <polygon points="6,22 10,22 4,28" fill="white" stroke="#94A3B8" stroke-width="1.5"/>
    <line x1="5" y1="22" x2="11" y2="22" stroke="white" stroke-width="2"/>
    <!-- content in bubble: exclamation -->
    <text x="16" y="15" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="10" fill="#F97316">!</text>
    <circle cx="10" cy="11" r="1.5" fill="#FBBF24"/>
    <circle cx="22" cy="11" r="1.5" fill="#FBBF24"/>
  </g>

  <!-- left arm raised/gesturing -->
  <path d="M36 56c-6-2-10-8-12-14" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <circle cx="23" cy="40" r="3" fill="#FDE68A" stroke="#F59E0B" stroke-width="1.5"/>

  <!-- right arm raised/pointing up -->
  <path d="M84 56c4-4 6-10 6-14" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <circle cx="90" cy="41" r="3" fill="#FDE68A" stroke="#F59E0B" stroke-width="1.5"/>

  <!-- legs -->
  <rect x="46" y="84" width="8" height="10" rx="4" fill="#FDE68A" stroke="#F59E0B" stroke-width="1.5"/>
  <rect x="64" y="84" width="8" height="10" rx="4" fill="#FDE68A" stroke="#F59E0B" stroke-width="1.5"/>

  <!-- microphone accessory on head -->
  <g transform="translate(56,38)">
    <line x1="4" y1="0" x2="4" y2="-6" stroke="#6B7280" stroke-width="1.5"/>
    <circle cx="4" cy="-8" r="3" fill="#374151" stroke="#1E293B" stroke-width="1"/>
    <path d="M0 0c0-1 3-2 4-2s4 1 4 2" stroke="#6B7280" stroke-width="1.2" fill="none"/>
  </g>

  <!-- action lines from mouth -->
  <path d="M66 68l6 2" stroke="#FBBF24" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M67 72l5 4" stroke="#FBBF24" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M46 68l-6 2" stroke="#FBBF24" stroke-width="1.5" stroke-linecap="round"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- bg circle -->
  <circle cx="60" cy="60" r="58" fill="#ECFDF5" stroke="#6EE7B7" stroke-width="2"/>

  <!-- sparkles -->
  <circle cx="22" cy="32" r="2" fill="#34D399" opacity="0.7"/>
  <circle cx="98" cy="32" r="2" fill="#34D399" opacity="0.7"/>
  <circle cx="16" cy="75" r="1.5" fill="#10B981" opacity="0.5"/>
  <circle cx="104" cy="75" r="1.5" fill="#10B981" opacity="0.5"/>

  <!-- sponge body -->
  <rect x="36" y="46" width="48" height="40" rx="8" fill="#FDE68A" stroke="#F59E0B" stroke-width="2"/>

  <!-- holes -->
  <circle cx="48" cy="60" r="3" fill="#FBBF24"/>
  <circle cx="64" cy="66" r="3.5" fill="#FBBF24"/>
  <circle cx="52" cy="76" r="2.5" fill="#FBBF24"/>
  <circle cx="70" cy="56" r="2" fill="#FBBF24"/>

  <!-- face - hopeful upward-looking eyes -->
  <circle cx="50" cy="62" r="3.5" fill="white"/>
  <circle cx="68" cy="62" r="3.5" fill="white"/>
  <circle cx="51" cy="61" r="2" fill="#1E293B"/>
  <circle cx="69" cy="61" r="2" fill="#1E293B"/>
  <circle cx="51.8" cy="60.2" r="0.8" fill="white"/>
  <circle cx="69.8" cy="60.2" r="0.8" fill="white"/>

  <!-- hopeful gentle smile -->
  <path d="M52 69c2 3 8 3 10 0" stroke="#1E293B" stroke-width="1.8" stroke-linecap="round" fill="none"/>

  <!-- blush -->
  <circle cx="43" cy="68" r="3.5" fill="#FECACA" opacity="0.5"/>
  <circle cx="75" cy="68" r="3.5" fill="#FECACA" opacity="0.5"/>

  <!-- sprout growing from head -->
  <g transform="translate(60,46)">
    <!-- stem -->
    <path d="M0 0c0-5-1-12-1-18" stroke="#22C55E" stroke-width="2" stroke-linecap="round" fill="none"/>
    <!-- left leaf -->
    <path d="M-1-14c-6-4-10-2-10 2c0 3 4 5 10 2" fill="#4ADE80" stroke="#22C55E" stroke-width="1"/>
    <!-- right leaf -->
    <path d="M-1-10c6-4 10-2 10 2c0 3-4 5-10 2" fill="#4ADE80" stroke="#22C55E" stroke-width="1"/>
    <!-- tiny leaf at top -->
    <path d="M-1-18c-2-3 0-5 2-4c2 1 2 3 0 4" fill="#86EFAC" stroke="#22C55E" stroke-width="0.8"/>
  </g>

  <!-- arms gently down, relaxed -->
  <path d="M36 60c-5 2-8 6-10 10" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <circle cx="25" cy="71" r="3" fill="#FDE68A" stroke="#F59E0B" stroke-width="1.5"/>
  <path d="M84 60c5 2 8 6 10 10" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <circle cx="95" cy="71" r="3" fill="#FDE68A" stroke="#F59E0B" stroke-width="1.5"/>

  <!-- legs -->
  <rect x="46" y="86" width="8" height="10" rx="4" fill="#FDE68A" stroke="#F59E0B" stroke-width="1.5"/>
  <rect x="64" y="86" width="8" height="10" rx="4" fill="#FDE68A" stroke="#F59E0B" stroke-width="1.5"/>

  <!-- small floating leaves -->
  <path d="M20 40c-2-1-1-3 1-3s3 2 1 3" fill="#86EFAC" opacity="0.6"/>
  <path d="M96 24c-2-1-1-3 1-3s3 2 1 3" fill="#86EFAC" opacity="0.6"/>
  <path d="M102 68c-1.5-0.8-0.8-2.5 0.8-2.5s2.3 1.5 0.8 2.5" fill="#86EFAC" opacity="0.5"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- bg circle -->
  <circle cx="60" cy="60" r="58" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>

  <!-- sparkles -->
  <circle cx="22" cy="28" r="2" fill="#4ADE80" opacity="0.7"/>
  <circle cx="98" cy="28" r="2" fill="#4ADE80" opacity="0.7"/>
  <circle cx="16" cy="75" r="1.5" fill="#22C55E" opacity="0.5"/>
  <circle cx="104" cy="75" r="1.5" fill="#22C55E" opacity="0.5"/>

  <!-- sponge body -->
  <rect x="36" y="42" width="48" height="40" rx="8" fill="#FDE68A" stroke="#F59E0B" stroke-width="2"/>

  <!-- holes -->
  <circle cx="48" cy="56" r="3" fill="#FBBF24"/>
  <circle cx="64" cy="62" r="3.5" fill="#FBBF24"/>
  <circle cx="52" cy="72" r="2.5" fill="#FBBF24"/>
  <circle cx="70" cy="52" r="2" fill="#FBBF24"/>

  <!-- face - focused eyes looking down-left at notebook -->
  <circle cx="50" cy="58" r="3.5" fill="white"/>
  <circle cx="68" cy="58" r="3.5" fill="white"/>
  <circle cx="49.5" cy="59" r="2" fill="#1E293B"/>
  <circle cx="67.5" cy="59" r="2" fill="#1E293B"/>
  <circle cx="50.3" cy="58.2" r="0.8" fill="white"/>
  <circle cx="68.3" cy="58.2" r="0.8" fill="white"/>

  <!-- focused/content slight smile -->
  <path d="M52 65c2 2 7 2 9 0" stroke="#1E293B" stroke-width="1.8" stroke-linecap="round" fill="none"/>

  <!-- blush -->
  <circle cx="43" cy="64" r="3.5" fill="#FECACA" opacity="0.5"/>
  <circle cx="75" cy="64" r="3.5" fill="#FECACA" opacity="0.5"/>

  <!-- notebook (left hand) -->
  <g transform="translate(10,48)">
    <rect x="0" y="0" width="18" height="22" rx="2" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
    <!-- lines on notebook -->
    <line x1="4" y1="6" x2="14" y2="6" stroke="#6EE7B7" stroke-width="1"/>
    <line x1="4" y1="10" x2="14" y2="10" stroke="#6EE7B7" stroke-width="1"/>
    <line x1="4" y1="14" x2="12" y2="14" stroke="#6EE7B7" stroke-width="1"/>
    <line x1="4" y1="18" x2="10" y2="18" stroke="#6EE7B7" stroke-width="1"/>
    <!-- spiral binding -->
    <circle cx="3" cy="3" r="1" fill="#059669"/>
    <circle cx="3" cy="8" r="1" fill="#059669"/>
    <circle cx="3" cy="13" r="1" fill="#059669"/>
    <circle cx="3" cy="18" r="1" fill="#059669"/>
  </g>

  <!-- left arm holding notebook -->
  <path d="M36 56c-4 0-6 1-8 2" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- pencil (right hand) -->
  <g transform="translate(88,42) rotate(25)">
    <rect x="0" y="-1.5" width="16" height="3" rx="0.5" fill="#FCA5A5"/>
    <polygon points="16,-1.5 20,0 16,1.5" fill="#1E293B"/>
    <rect x="0" y="-1.5" width="3" height="3" rx="0.5" fill="#F87171"/>
    <rect x="13" y="-1.5" width="3" height="3" fill="#FBBF24"/>
  </g>

  <!-- right arm holding pencil -->
  <path d="M84 56c3-3 5-7 6-10" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- legs -->
  <rect x="46" y="82" width="8" height="10" rx="4" fill="#FDE68A" stroke="#F59E0B" stroke-width="1.5"/>
  <rect x="64" y="82" width="8" height="10" rx="4" fill="#FDE68A" stroke="#F59E0B" stroke-width="1.5"/>

  <!-- glasses -->
  <circle cx="50" cy="57" r="6" fill="none" stroke="#374151" stroke-width="1.5"/>
  <circle cx="68" cy="57" r="6" fill="none" stroke="#374151" stroke-width="1.5"/>
  <line x1="56" y1="57" x2="62" y2="57" stroke="#374151" stroke-width="1.5"/>
  <line x1="44" y1="56" x2="39" y2="54" stroke="#374151" stroke-width="1.5"/>
  <line x1="74" y1="56" x2="79" y2="54" stroke="#374151" stroke-width="1.5"/>

  <!-- writing motion lines -->
  <path d="M95 55l4-2" stroke="#86EFAC" stroke-width="1" stroke-linecap="round"/>
  <path d="M96 60l5 0" stroke="#86EFAC" stroke-width="1" stroke-linecap="round"/>
</svg>

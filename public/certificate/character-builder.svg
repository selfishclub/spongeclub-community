<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- bg circle -->
  <circle cx="60" cy="60" r="58" fill="#FEF3C7" stroke="#FCD34D" stroke-width="2"/>

  <!-- sparkles -->
  <circle cx="22" cy="28" r="2" fill="#F59E0B" opacity="0.7"/>
  <circle cx="98" cy="28" r="2" fill="#F59E0B" opacity="0.7"/>
  <circle cx="16" cy="75" r="1.5" fill="#D97706" opacity="0.5"/>
  <circle cx="104" cy="75" r="1.5" fill="#D97706" opacity="0.5"/>

  <!-- sponge body -->
  <rect x="36" y="42" width="48" height="40" rx="8" fill="#FDE68A" stroke="#F59E0B" stroke-width="2"/>

  <!-- holes -->
  <circle cx="48" cy="56" r="3" fill="#FBBF24"/>
  <circle cx="64" cy="62" r="3.5" fill="#FBBF24"/>
  <circle cx="52" cy="72" r="2.5" fill="#FBBF24"/>
  <circle cx="70" cy="52" r="2" fill="#FBBF24"/>

  <!-- face -->
  <circle cx="50" cy="58" r="3.5" fill="white"/>
  <circle cx="68" cy="58" r="3.5" fill="white"/>
  <!-- determined eyes (slightly angled brows) -->
  <circle cx="51.5" cy="57.5" r="2" fill="#1E293B"/>
  <circle cx="69.5" cy="57.5" r="2" fill="#1E293B"/>
  <circle cx="52.3" cy="56.7" r="0.8" fill="white"/>
  <circle cx="70.3" cy="56.7" r="0.8" fill="white"/>
  <!-- determined eyebrows -->
  <path d="M46 54l5-2" stroke="#1E293B" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M72 54l-5-2" stroke="#1E293B" stroke-width="1.5" stroke-linecap="round"/>

  <!-- determined grin -->
  <path d="M52 65c2 3 8 3 10 0" stroke="#1E293B" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- blush -->
  <circle cx="43" cy="64" r="3.5" fill="#FECACA" opacity="0.5"/>
  <circle cx="75" cy="64" r="3.5" fill="#FECACA" opacity="0.5"/>

  <!-- wrench (right hand) -->
  <g transform="translate(88,48) rotate(-20)">
    <rect x="0" y="-2" width="14" height="4" rx="1" fill="#9CA3AF" stroke="#6B7280" stroke-width="1"/>
    <path d="M14-4c3 0 5 2 5 4s-2 4-5 4" fill="none" stroke="#6B7280" stroke-width="1.5"/>
    <path d="M14 0h5" stroke="#6B7280" stroke-width="1.5"/>
  </g>

  <!-- right arm holding wrench -->
  <path d="M84 56c3-2 5-4 6-6" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- left arm with fist -->
  <path d="M36 56c-4-2-7-6-9-10" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <circle cx="26" cy="45" r="3" fill="#FDE68A" stroke="#F59E0B" stroke-width="1.5"/>

  <!-- legs -->
  <rect x="46" y="82" width="8" height="10" rx="4" fill="#FDE68A" stroke="#F59E0B" stroke-width="1.5"/>
  <rect x="64" y="82" width="8" height="10" rx="4" fill="#FDE68A" stroke="#F59E0B" stroke-width="1.5"/>

  <!-- hard hat -->
  <ellipse cx="60" cy="43" rx="22" ry="4" fill="#FB923C" opacity="0.8"/>
  <path d="M40 43c0-10 10-16 20-16s20 6 20 16" fill="#F97316" stroke="#EA580C" stroke-width="1.5"/>
  <rect x="55" y="27" width="10" height="3" rx="1.5" fill="#FDBA74"/>

  <!-- gear icon floating -->
  <g transform="translate(18,28)" opacity="0.6">
    <circle cx="0" cy="0" r="4" fill="none" stroke="#9CA3AF" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="1.5" fill="#9CA3AF"/>
  </g>
  <g transform="translate(100,32)" opacity="0.5">
    <circle cx="0" cy="0" r="3" fill="none" stroke="#9CA3AF" stroke-width="1.2"/>
    <circle cx="0" cy="0" r="1" fill="#9CA3AF"/>
  </g>
</svg>

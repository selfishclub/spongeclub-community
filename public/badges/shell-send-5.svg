<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <circle cx="40" cy="40" r="38" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2.5"/>
  <!-- turtle shell -->
  <ellipse cx="40" cy="42" rx="18" ry="14" fill="#22C55E" stroke="#16A34A" stroke-width="1.5"/>
  <!-- shell pattern -->
  <path d="M40 28v28" stroke="#16A34A" stroke-width="1" opacity="0.4"/>
  <path d="M28 36c8 2 16 2 24 0" stroke="#16A34A" stroke-width="1" opacity="0.4"/>
  <path d="M28 48c8-2 16-2 24 0" stroke="#16A34A" stroke-width="1" opacity="0.4"/>
  <!-- belly visible -->
  <ellipse cx="40" cy="50" rx="12" ry="4" fill="#BBF7D0"/>
  <!-- head -->
  <ellipse cx="26" cy="38" rx="8" ry="7" fill="#4ADE80" stroke="#16A34A" stroke-width="1.5"/>
  <!-- face -->
  <circle cx="23" cy="36" r="1.8" fill="#1E293B"/>
  <circle cx="23.6" cy="35.4" r="0.7" fill="white"/>
  <!-- smile -->
  <path d="M21 40c1.5 1.5 4 1.5 5.5 0" stroke="#1E293B" stroke-width="1" stroke-linecap="round" fill="none"/>
  <!-- blush -->
  <circle cx="20" cy="39" r="2" fill="#FECACA" opacity="0.4"/>
  <!-- front legs -->
  <ellipse cx="24" cy="50" rx="4" ry="2.5" fill="#4ADE80" stroke="#16A34A" stroke-width="1" transform="rotate(-20 24 50)"/>
  <ellipse cx="56" cy="48" rx="4" ry="2.5" fill="#4ADE80" stroke="#16A34A" stroke-width="1" transform="rotate(20 56 48)"/>
  <!-- back legs -->
  <ellipse cx="26" cy="52" rx="3" ry="2" fill="#4ADE80" stroke="#16A34A" stroke-width="1"/>
  <ellipse cx="54" cy="52" rx="3" ry="2" fill="#4ADE80" stroke="#16A34A" stroke-width="1"/>
  <!-- tail -->
  <path d="M58 44c2 0 4 1 4 2s-2 1-4 1" fill="#4ADE80" stroke="#16A34A" stroke-width="1"/>
</svg>

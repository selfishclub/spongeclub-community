<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <circle cx="40" cy="40" r="38" fill="#FDF2F8" stroke="#F9A8D4" stroke-width="2.5"/>
  <!-- seahorse body -->
  <path d="M42 18c-6 0-12 6-12 14 0 6 2 10 4 14s2 8 0 12c-1 2-3 4-2 4s4-2 6-6c1-2 1-4 0-6" fill="#EC4899" stroke="#DB2777" stroke-width="1.5"/>
  <!-- belly ridge -->
  <path d="M34 32c0 4 1 8 3 12s2 6 1 10" stroke="#F9A8D4" stroke-width="2" fill="none"/>
  <!-- dorsal fin spikes -->
  <path d="M42 20c2-1 3 0 2 2M44 24c2-1 3 0 2 2M44 28c2-1 3 0 2 2M43 32c2-1 3 0 2 2M42 36c2 0 3 1 2 2" stroke="#DB2777" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- snout -->
  <path d="M30 28c-4 0-8 1-10 3s0 3 2 2 4-2 6-3" fill="#EC4899" stroke="#DB2777" stroke-width="1.2"/>
  <!-- eye -->
  <circle cx="34" cy="26" r="3" fill="white" stroke="#DB2777" stroke-width="1"/>
  <circle cx="35" cy="25.5" r="1.8" fill="#1E293B"/>
  <circle cx="35.6" cy="25" r="0.7" fill="white"/>
  <!-- crown / head tuft -->
  <path d="M38 18c0-3 1-5 3-6s3 1 2 3" fill="#EC4899" stroke="#DB2777" stroke-width="1"/>
  <circle cx="42" cy="12" r="2" fill="#FBBF24"/>
  <!-- blush -->
  <circle cx="30" cy="30" r="2" fill="#FECACA" opacity="0.5"/>
  <!-- tail curl -->
  <path d="M34 58c-2 2-4 2-5 0s1-3 3-3" fill="#EC4899" stroke="#DB2777" stroke-width="1.2"/>
  <!-- bubbles -->
  <circle cx="22" cy="22" r="2" fill="#BAE6FD" opacity="0.6"/>
  <circle cx="18" cy="28" r="1.5" fill="#BAE6FD" opacity="0.5"/>
</svg>

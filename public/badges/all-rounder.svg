  <circle cx="45" cy="40" r="2.5" fill="white"/>
  <circle cx="36" cy="39.5" r="1.5" fill="#1E293B"/>
  <circle cx="46" cy="39.5" r="1.5" fill="#1E293B"/>
  <circle cx="36.5" cy="39" r="0.6" fill="white"/>

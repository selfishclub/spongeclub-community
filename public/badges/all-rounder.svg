  <circle cx="18" cy="22" r="2" fill="#F472B6" opacity="0.6"/>
  <circle cx="62" cy="22" r="2" fill="#7DD3FC" opacity="0.6"/>
  <circle cx="18" cy="58" r="1.5" fill="#A78BFA" opacity="0.6"/>

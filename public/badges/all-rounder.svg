  <!-- sponge body -->
  <rect x="26" y="30" width="28" height="24" rx="6" fill="#FDE68A" stroke="#F59E0B" stroke-width="1.5"/>
  <!-- holes -->
  <circle cx="33" cy="38" r="2" fill="#FBBF24"/>
  <circle cx="44" cy="42" r="2.5" fill="#FBBF24"/>
  <circle cx="36" cy="48" r="1.5" fill="#FBBF24"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <circle cx="40" cy="40" r="38" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2.5"/>
  <!-- whale body -->
  <ellipse cx="40" cy="42" rx="20" ry="14" fill="#60A5FA" stroke="#3B82F6" stroke-width="1.5"/>
  <!-- belly -->
  <ellipse cx="40" cy="46" rx="14" ry="8" fill="#BFDBFE"/>
  <!-- tail -->
  <path d="M60 40c4-2 8-6 10-4s-2 6-2 8c0 2 4 6 2 8s-6-2-10-4" fill="#60A5FA" stroke="#3B82F6" stroke-width="1.5"/>
  <!-- water spout -->
  <path d="M34 28c-1-4 0-8 2-10" stroke="#7DD3FC" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M37 28c0-4 2-7 4-9" stroke="#7DD3FC" stroke-width="2" stroke-linecap="round" fill="none"/>
  <circle cx="32" cy="17" r="2" fill="#BAE6FD"/>
  <circle cx="38" cy="15" r="1.5" fill="#BAE6FD"/>
  <circle cx="43" cy="17" r="2" fill="#BAE6FD"/>
  <!-- face -->
  <circle cx="33" cy="40" r="2" fill="#1E293B"/>
  <circle cx="32.2" cy="39.2" r="0.8" fill="white"/>
  <!-- smile -->
  <path d="M30 44c2 2 5 2 7 0" stroke="#1E293B" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  <!-- blush -->
  <circle cx="28" cy="43" r="2.5" fill="#FECACA" opacity="0.5"/>
  <!-- fin -->
  <path d="M38 34c2-3 5-4 6-2s-1 4-3 5" fill="#3B82F6"/>

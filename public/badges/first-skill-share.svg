<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <circle cx="40" cy="40" r="38" fill="#FEF3C7" stroke="#FCD34D" stroke-width="2.5"/>
  <!-- crab body -->
  <ellipse cx="40" cy="46" rx="14" ry="10" fill="#EF4444" stroke="#DC2626" stroke-width="1.5"/>
  <!-- belly pattern -->
  <ellipse cx="40" cy="48" rx="9" ry="6" fill="#FCA5A5"/>
  <!-- claws -->
  <g>
    <!-- left claw -->
    <path d="M26 42c-4-2-8-1-10 1s0 5 2 5" stroke="#DC2626" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <circle cx="17" cy="44" r="5" fill="#EF4444" stroke="#DC2626" stroke-width="1.5"/>
    <path d="M14 43c2 0 3 1 3 2" stroke="#DC2626" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <!-- right claw -->
    <path d="M54 42c4-2 8-1 10 1s0 5-2 5" stroke="#DC2626" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <circle cx="63" cy="44" r="5" fill="#EF4444" stroke="#DC2626" stroke-width="1.5"/>
    <path d="M66 43c-2 0-3 1-3 2" stroke="#DC2626" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  </g>
  <!-- eyes on stalks -->
  <line x1="35" y1="36" x2="33" y2="30" stroke="#DC2626" stroke-width="2" stroke-linecap="round"/>
  <line x1="45" y1="36" x2="47" y2="30" stroke="#DC2626" stroke-width="2" stroke-linecap="round"/>
  <circle cx="33" cy="28" r="3.5" fill="white" stroke="#DC2626" stroke-width="1.5"/>
  <circle cx="47" cy="28" r="3.5" fill="white" stroke="#DC2626" stroke-width="1.5"/>
  <circle cx="34" cy="27.5" r="2" fill="#1E293B"/>
  <circle cx="48" cy="27.5" r="2" fill="#1E293B"/>
  <circle cx="34.6" cy="26.8" r="0.7" fill="white"/>
  <circle cx="48.6" cy="26.8" r="0.7" fill="white"/>
  <!-- smile -->
  <path d="M37 49c1.5 1.5 4.5 1.5 6 0" stroke="#1E293B" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  <!-- blush -->
  <circle cx="34" cy="48" r="2" fill="#FECACA" opacity="0.5"/>
  <circle cx="46" cy="48" r="2" fill="#FECACA" opacity="0.5"/>
</svg>
